name: GenAI Chatbot CI/CD

on:
  push:
      branches: [ main ]
        pull_request:
            branches: [ main ]

            jobs:
              test:
                  name: Test & Lint
                      runs-on: ubuntu-latest

                              steps:
                                  - name: Checkout code
                                        uses: actions/checkout@v4

                                                - name: Set up Python
                                                      uses: actions/setup-python@v4
                                                            with:
                                                                    python-version: '3.11'
                                                                            cache: 'pip'

                                                                                    - name: Install dependencies
                                                                                          run: |
                                                                                                  python -m pip install --upgrade pip
                                                                                                          pip install -r requirements.txt
                                                                                                                  pip install flake8
                                                                                                                      
                                                                                                                          - name: Lint with flake8
                                                                                                                                run: |
                                                                                                                                        flake8 app.py --max-line-length=120 --ignore=E501,W503
                                                                                                                                            
                                                                                                                                                - name: Check imports
                                                                                                                                                      run: |
                                                                                                                                                              python -c "import streamlit; import openai; print('All imports successful!')"
                                                                                                                                                                  
                                                                                                                                                                      - name: Validate app syntax
                                                                                                                                                                            run: |
                                                                                                                                                                                    python -m py_compile app.py
                                                                                                                                                                                            echo "app.py syntax is valid!"
                                                                                                                                                                                            
                                                                                                                                                                                              deploy-info:
                                                                                                                                                                                                  name: Deploy Instructions
                                                                                                                                                                                                      runs-on: ubuntu-latest
                                                                                                                                                                                                          needs: test
                                                                                                                                                                                                              if: github.ref == 'refs/heads/main'
                                                                                                                                                                                                                  
                                                                                                                                                                                                                      steps:
                                                                                                                                                                                                                          - name: Show deployment info
                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                        echo "=========================================="
                                                                                                                                                                                                                                                echo "  GenAI Chatbot - Deployment Ready!"
                                                                                                                                                                                                                                                        echo "=========================================="
                                                                                                                                                                                                                                                                echo ""
                                                                                                                                                                                                                                                                        echo "Deploy to Streamlit Community Cloud:"
                                                                                                                                                                                                                                                                                echo "  1. Go to: https://share.streamlit.io"
                                                                                                                                                                                                                                                                                        echo "  2. Connect GitHub repo: Nithinreddy8333/genai-chatbot"
                                                                                                                                                                                                                                                                                                echo "  3. Set main file: app.py"
                                                                                                                                                                                                                                                                                                        echo "  4. Click Deploy!"
                                                                                                                                                                                                                                                                                                                echo ""
                                                                                                                                                                                                                                                                                                                        echo "  The app will be live at:"
                                                                                                                                                                                                                                                                                                                                echo "  https://nithinreddy8333-genai-chatbot-app-xxxxx.streamlit.app"
                                                                                                                                                                                                                                                                                                                                        echo ""
                                                                                                                                                                                                                                                                                                                                                echo "All checks passed! Ready to deploy."
